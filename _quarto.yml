project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "notes/*.qmd"
    - "labs/*.qmd"
    - "examples/*.qmd"
    - "resources/*.qmd"

website:
  title: "Intro to Mathematical Software"
  site-url: https://matthewhester.com/math-software/
  description: |
    Public course resources for Intro to Mathematical Software —
    mathematical writing, R-based computation, reproducible Quarto
    workflows, and responsible AI-assisted technical work.
  open-graph: true

  navbar:
    pinned: true
    background: dark
    left:
      - href: index.qmd
        text: Home
      - href: syllabus.qmd
        text: Syllabus
      - href: schedule.qmd
        text: Schedule

  sidebar:
    style: floating
    collapse-level: 2
    contents:
      - section: "Notes"
        href: notes/index.qmd
        contents:
          - notes/index.qmd
          - href: notes/week01-first-render.qmd
            text: "1 — Your first render"
          - href: notes/week02-latex-foundations.qmd
            text: "2 — Writing mathematics from source"
          - href: notes/week03-structuring-mathematical-writing.qmd
            text: "3 — Structuring mathematical writing"
          - href: notes/week04-figures-tables-references.qmd
            text: "4 — Figures, tables, and references"
          - href: notes/week05-paper-pick.qmd
            text: "5 — Picking a paper to replicate"
          - href: notes/week06-finishing-the-latex-project.qmd
            text: "6 — Finishing the LaTeX Project"
          - href: notes/week07-r-foundations-in-vscode.qmd
            text: "7 — R foundations in VS Code"
          - href: notes/week08-ggplot.qmd
            text: "8 — Visualization with ggplot2"
          - href: notes/week09-simulation.qmd
            text: "9 — Simulation and reproducibility"
          - href: notes/week10-r-project.qmd
            text: "10 — The R Project"
          - href: notes/week11-using-ai.qmd
            text: "11 — A mental model for AI assistants"
      - section: "Labs"
        href: labs/index.qmd
        contents:
          - labs/index.qmd
          - href: labs/lab01-install-stack.qmd
            text: "1 — Install the stack"
          - href: labs/lab02-first-latex-math.qmd
            text: "2 — First LaTeX math"
          - href: labs/lab03-claim-example-justification.qmd
            text: "3 — Claim, example, and justification"
          - href: labs/lab04-figure-table-citation.qmd
            text: "4 — Figure, table, and citation"
          - href: labs/lab05-first-r.qmd
            text: "5 — A tour of a tidy dataset in R"
          - href: labs/lab06-ggplot.qmd
            text: "6 — A ggplot2 walkthrough"
          - href: labs/lab07-simulation.qmd
            text: "7 — A small reproducible simulation in R"
          - href: labs/lab08-ai-debugging.qmd
            text: "8 — Drafting and verifying with AI"
      - section: "Examples"
        href: examples/index.qmd
        contents:
          - examples/index.qmd
      - section: "Resources"
        href: resources/index.qmd
        contents:
          - resources/index.qmd
          - resources/software-setup.qmd
          - resources/data-guidelines.qmd
          - resources/finding-open-access-papers.qmd
          - resources/ai-use-guidelines.qmd
          - resources/ai-reading-spine.qmd
          - resources/cas-options.qmd

  page-footer:
    left: "© 2026 Matt Hester · Intro to Mathematical Software"
    center: "[Matt Hester · matthewhester.com](https://matthewhester.com/)"
    right: "Built with [Quarto](https://quarto.org)"

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    toc-location: right
    anchor-sections: true
    smooth-scroll: true
    link-external-newwindow: true
    fontsize: 1.05em
    mainfont: "Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    monofont: "JetBrains Mono, Consolas, Menlo, monospace"
